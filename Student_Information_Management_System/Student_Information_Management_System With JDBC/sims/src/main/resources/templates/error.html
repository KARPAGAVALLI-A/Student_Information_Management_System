<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SIMS - Error</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="brand" th:href="@{/}"><div class="brand-icon">&#127891;</div>SI<span>MS</span></a>
</nav>
<div class="wrap">
  <div class="ep">
    <div class="ec">ERR</div>
    <h2 class="et" th:text="${errorTitle} ?: 'Something went wrong'"></h2>
    <p class="em" th:text="${errorMessage} ?: 'An unexpected error occurred.'"></p>
    <a th:href="@{/students}" class="btn btn-p" style="margin-top:1.5rem">&#8592; Back to Students</a>
  </div>
</div>
</body>
</html>
