<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SIMS - Add Student</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="brand" th:href="@{/}"><div class="brand-icon">&#127891;</div>SI<span>MS</span></a>
  <div class="nav-right"><a th:href="@{/students}" class="btn btn-o">&#8592; Back</a></div>
</nav>
<div class="wrap">
  <div class="page-hd"><div><h1>Add Student</h1><p>Enrol a new student</p></div></div>
  <div class="card">
    <div class="card-h"><h2>Student Information</h2></div>
    <div class="card-b">
      <form method="post" th:action="@{/students/add}">

        <div class="ft">Basic Details</div>
        <div class="fg">
          <div class="fgrp"><label>Student ID</label><input type="number" name="studentId" placeholder="e.g. 1001" required/></div>
          <div class="fgrp"><label>Full Name</label><input type="text" name="studentName" placeholder="e.g. Arun Kumar" required/></div>
          <div class="fgrp"><label>Department</label><input type="text" name="department" placeholder="e.g. Computer Science" required/></div>
        </div>

        <div class="fsec">
          <div class="ft">Marks</div>
          <div class="fg">
            <div class="fgrp"><label>Internal Marks</label><input type="number" name="internal" placeholder="0 - 100" min="0" max="100" required/></div>
            <div class="fgrp"><label>External Marks</label><input type="number" name="external" placeholder="0 - 100" min="0" max="100" required/></div>
          </div>
        </div>

        <div class="fsec">
          <div class="ft">Attendance</div>
          <div class="fg">
            <div class="fgrp"><label>Total Classes</label><input type="number" name="totalClass" placeholder="e.g. 60" min="0" required/></div>
            <div class="fgrp"><label>Classes Present</label><input type="number" name="present" placeholder="e.g. 50" min="0" required/></div>
          </div>
        </div>

        <div class="fsec">
          <div class="ft">Fee</div>
          <div class="fg">
            <div class="fgrp"><label>Fee Amount</label><input type="number" name="feeAmount" placeholder="e.g. 45000" min="0" step="0.01" required/></div>
          </div>
        </div>

        <div class="fsec">
          <div class="ft">Course</div>
          <div class="fg">
            <div class="fgrp"><label>Course ID</label><input type="number" name="courseId" placeholder="e.g. 301" required/></div>
            <div class="fgrp"><label>Course Name</label><input type="text" name="courseName" placeholder="e.g. Data Structures" required/></div>
          </div>
        </div>

        <div class="fa">
          <button type="submit" class="btn btn-p">&#10003; Add Student</button>
          <a th:href="@{/students}" class="btn btn-o">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
