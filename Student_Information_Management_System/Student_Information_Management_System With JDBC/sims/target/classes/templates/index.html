<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SIMS - Students</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="brand" th:href="@{/}"><div class="brand-icon">&#127891;</div>SI<span>MS</span></a>
  <div class="nav-right"><a th:href="@{/students/add}" class="btn btn-p">+ Add Student</a></div>
</nav>
<div class="wrap">

  <div class="alert alert-ok" th:if="${successMessage}">
    &#10003;&nbsp;<span th:text="${successMessage}"></span>
  </div>

  <div class="page-hd">
    <div><h1>Students</h1><p>Manage all enrolled students</p></div>
  </div>

  <div class="stats">
    <div class="stat cb">
      <div class="stat-l">Total</div>
      <div class="stat-v" th:text="${students.size()}">0</div>
    </div>
    <div class="stat cg">
      <div class="stat-l">Passed</div>
      <div class="stat-v" th:text="${#lists.size(students.?[result.resultStatus == 'Pass'])}">0</div>
    </div>
    <div class="stat cr">
      <div class="stat-l">Failed</div>
      <div class="stat-v" th:text="${#lists.size(students.?[result.resultStatus == 'Fail'])}">0</div>
    </div>
    <div class="stat cc">
      <div class="stat-l">Fee Paid</div>
      <div class="stat-v" th:text="${#lists.size(students.?[fee.feeStatus == 'Paid'])}">0</div>
    </div>
  </div>

  <form method="get" th:action="@{/students/search}" class="sbar">
    <input type="number" name="studentId" placeholder="Search by Student ID..." required/>
    <button type="submit" class="btn btn-o">Search</button>
  </form>

  <div class="tw">
    <table th:if="${not #lists.isEmpty(students)}">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Department</th>
          <th>Marks</th><th>Attendance</th><th>Fee</th><th>Result</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${students}">
          <td style="font-family:'Syne',sans-serif;font-weight:700;color:#64748b" th:text="${s.studentId}"></td>
          <td style="font-weight:500" th:text="${s.studentName}"></td>
          <td th:text="${s.department}"></td>
          <td>
            <span th:text="${s.marks.getTotal()} + ' / 200'"></span>
            <div class="pw"><div class="pb" th:classappend="${s.marks.getTotal()>=50?'pb-bl':'pb-rd'}"
                 th:style="'width:'+${s.marks.getTotal()/2.0}+'%'"></div></div>
          </td>
          <td>
            <span th:text="${#numbers.formatDecimal(s.attendance.calcPercentage(),1,1)}+'%'"></span>
            <div class="pw"><div class="pb" th:classappend="${s.attendance.calcPercentage()>=75?'pb-gn':'pb-rd'}"
                 th:style="'width:'+${s.attendance.calcPercentage()}+'%'"></div></div>
          </td>
          <td>
            <span class="badge" th:classappend="${s.fee.feeStatus=='Paid'?'b-paid':'b-unpd'}"
                  th:text="${s.fee.feeStatus}"></span>
          </td>
          <td>
            <span class="badge" th:classappend="${s.result.resultStatus=='Pass'?'b-pass':'b-fail'}"
                  th:text="${s.result.resultStatus}"></span>
          </td>
          <td>
            <div class="acts">
              <a th:href="@{/students/view/{i}(i=${s.studentId})}" class="btn btn-o btn-sm btn-ico" title="View">&#128065;</a>
              <a th:href="@{/students/edit/{i}(i=${s.studentId})}" class="btn btn-o btn-sm btn-ico" title="Edit">&#9998;</a>
              <a th:href="@{/students/delete/{i}(i=${s.studentId})}" class="btn btn-d btn-sm btn-ico" title="Delete"
                 onclick="return confirm('Delete this student?')">&#128465;</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty" th:if="${#lists.isEmpty(students)}">
      <div class="ei">&#127891;</div>
      <h3>No Students Yet</h3>
      <p>Add your first student to get started.</p>
      <a th:href="@{/students/add}" class="btn btn-p" style="margin-top:1rem">+ Add Student</a>
    </div>
  </div>
</div>
</body>
</html>
