<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SIMS - Edit Student</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a class="brand" th:href="@{/}"><div class="brand-icon">&#127891;</div>SI<span>MS</span></a>
  <div class="nav-right"><a th:href="@{/students}" class="btn btn-o">&#8592; Back</a></div>
</nav>
<div class="wrap">
  <div class="page-hd"><div><h1>Edit Student</h1><p>Update name and department</p></div></div>
  <div class="card">
    <div class="card-h">
      <h2>Update &mdash; ID:&nbsp;<span style="color:var(--ac)" th:text="${student.studentId}"></span></h2>
    </div>
    <div class="card-b">
      <form method="post" th:action="@{/students/edit/{i}(i=${student.studentId})}">
        <div class="fg">
          <div class="fgrp"><label>Full Name</label><input type="text" name="studentName" th:value="${student.studentName}" required/></div>
          <div class="fgrp"><label>Department</label><input type="text" name="department" th:value="${student.department}" required/></div>
        </div>
        <div class="fa">
          <button type="submit" class="btn btn-p">&#10003; Update</button>
          <a th:href="@{/students}" class="btn btn-o">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
